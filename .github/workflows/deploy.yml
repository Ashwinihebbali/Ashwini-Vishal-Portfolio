name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Remove symlinks and problematic files
        run: |
          if [ -d "./dist" ]; then
            # Remove all symlinks
            find ./dist -type l -delete
            
            # Remove files with hard links (more than 1 link)
            find ./dist -type f -links +1 -delete
            
            # Remove problematic directories
            find ./dist -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
            find ./dist -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
            find ./dist -name ".next" -type d -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Check artifact size
        run: |
          if [ -d "./dist" ]; then
            echo "Artifact size:"
            du -sh ./dist
            echo "Detailed breakdown:"
            du -sh ./dist/* 2>/dev/null | head -20
          else
            echo "dist folder not found"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: './dist'
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
